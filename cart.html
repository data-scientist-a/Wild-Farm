<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Wild Farm</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Wild Farm</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">Our Story</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
      </nav>
    </header>

    <main>
      <h2>Your Shopping Cart</h2>
      
      <div id="cartContent">
        <div id="cartItems" class="cart-items"></div>
        
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <p>Total Items: <span id="totalItems">0</span></p>
          <p>Total Price: $<span id="totalPrice">0.00</span></p>
          <button id="checkoutBtn" class="checkout-btn">Proceed to Checkout</button>
          <button id="continueShopping" class="continue-btn">Continue Shopping</button>
        </div>
      </div>
      
      <div id="emptyCart" class="empty-cart" style="display: none;">
        <p>Your cart is empty</p>
        <button id="shopNow" class="shop-now-btn">Shop Now</button>
      </div>
    </main>

    <footer>
      <p>© 2026 Wild Farm. All rights reserved</p>
    </footer>
    
    <script src="app.js"></script>
  </body>
</html>
